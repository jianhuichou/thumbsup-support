  <text x="28" y="416" fill="#14203a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="900">Wish List</text>
  <circle cx="203" cy="410" r="14" fill="#6d5dfc"/>
  <path d="M198 410h10M203 405v10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
