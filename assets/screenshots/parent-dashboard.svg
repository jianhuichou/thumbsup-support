  <text x="44" y="372" fill="#14203a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="900">Parent Plan</text>
  <rect x="44" y="388" width="130" height="10" rx="5" fill="#e7ecf5"/>
