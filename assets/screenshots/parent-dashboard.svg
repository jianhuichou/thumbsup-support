  <rect x="28" y="236" width="184" height="84" rx="20" fill="#fff" stroke="#e1e7f0"/>
  <text x="44" y="266" fill="#14203a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="900">Needs Your Attention</text>
  <text x="44" y="290" fill="#667085" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11">Review requests and keep the family plan on track.</text>
  <rect x="44" y="300" width="74" height="8" rx="4" fill="#dde5ff"/>
